<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Private Space</title>
    <style>
        :root {
            --primary-pink: #ff4d6d;
            --soft-pink: #fff0f3;
            --dark-pink: #c9184a;
            --text-color: #590d22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--soft-pink);
            color: var(--text-color);
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: absolute;
            bottom: -100px;
            font-size: 2rem;
            color: rgba(255, 77, 109, 0.2);
            animation: floatUp 8s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 2;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 109, 0.15);
            text-align: center;
            border: 2px solid rgba(255, 182, 193, 0.5);
        }

        .hidden { display: none !important; }

        h2 { color: var(--dark-pink); margin-bottom: 20px; font-size: 1.8rem; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ffb3c1;
            border-radius: 25px;
            outline: none;
            text-align: center;
            font-size: 1rem;
            margin-bottom: 15px;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary-pink); }
        
        button {
            background: var(--primary-pink);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.4);
        }
        button:hover { background: var(--dark-pink); }

        .chat-box {
            height: 300px;
            border: 1px solid #ffe5ec;
            border-radius: 15px;
            background: white;
            margin-bottom: 15px;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 75%;
            padding: 10px 15px;
            border-radius: 15px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word;
        }
        .msg-left { background: #f0f0f0; align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg-right { background: #ffe5ec; color: var(--dark-pink); align-self: flex-end; border-bottom-right-radius: 2px; }

        .input-area { display: flex; gap: 10px; }
        .input-area input { margin-bottom: 0; text-align: left; padding-left: 20px; }

        .tabs { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; border-bottom: 2px solid #ffe5ec; padding-bottom: 10px; }
        .tab-btn { background: none; color: #aaa; box-shadow: none; padding: 5px 10px; font-size: 1.1rem; border-radius: 0; }
        .tab-btn.active { color: var(--dark-pink); border-bottom: 3px solid var(--dark-pink); }
        .tab-btn:hover { background: none; color: var(--primary-pink); }

        .gift-card {
            background: linear-gradient(135deg, #ffe5ec, #ffb3c1);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.05);
        }
        .gift-card h3 { color: var(--dark-pink); margin-bottom: 5px; }
        .gift-card p { font-size: 0.9rem; margin-bottom: 15px; }
    </style>
</head>
<body>

    <div class="bg-hearts" id="heartsBg"></div>

    <!-- 1. LOCKSCREEN SCREEN -->
    <div class="container" id="lockScreen">
        <h2>🔒 Private Space</h2>
        <input type="password" id="passwordInput" placeholder="Enter Our Special Secret Password">
        <button onclick="checkPassword()">Unlock</button>
    </div>

    <!-- 2. NICKNAME SETUP SCREEN -->
    <div class="container hidden" id="profileScreen">
        <h2>✨ Set Your Profile</h2>
        <input type="text" id="nicknameInput" placeholder="Enter Your Nickname">
        <button onclick="saveProfile()">Enter Room</button>
    </div>

    <!-- 3. MAIN APPLICATION INTERFACE -->
    <div class="container hidden" id="mainApp">
        <div class="tabs">
            <button class="tab-btn active" id="btnChat" onclick="switchTab('chat')">💬 Chat</button>
            <button class="tab-btn" id="btnGifts" onclick="switchTab('gifts')">🎁 Gifts</button>
        </div>

        <!-- Chat View Area -->
        <div id="chatView">
            <div class="chat-box" id="chatBox"></div>
            <div class="input-area">
                <input type="text" id="chatInputField" placeholder="Type a message...">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>

        <!-- Gifts/Coupons View Area -->
        <div id="giftsView" class="hidden">
            <div class="gift-card">
                <h3>🍦 Free Ice Cream Date</h3>
                <p>Valid anytime you crave something sweet.</p>
                <button onclick="claimGift(this)">Claim Coupon ⚡</button>
            </div>
            <div class="gift-card">
                <h3>🎬 Movie Choice Pass</h3>
                <p>You get to pick completely what we watch next.</p>
                <button onclick="claimGift(this)">Claim Coupon ⚡</button>
            </div>
        </div>
    </div>

    <!-- Firebase System Scripts -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // Your Verified Live Realtime Database Credentials
        const firebaseConfig = {
            databaseURL: "https://our-space-97e7c-default-rtdb.firebaseio.com/"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userNickname = "";

        // Background Hearts Generator
        const bg = document.getElementById('heartsBg');
        const hearts = ['❤️', '💖', '💝', '💕'];
        for (let i = 0; i < 15; i++) {
            let h = document.createElement('div');
            h.classList.add('heart');
            h.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            h.style.left = Math.random() * 100 + '%';
            h.style.animationDelay = Math.random() * 8 + 's';
            h.style.fontSize = (Math.random() * 1.5 + 1) + 'rem';
            bg.appendChild(h);
        }

        // --- 1. Security Lockscreen Logic ---
        function checkPassword() {
            const pin = document.getElementById('passwordInput').value;
            if (pin === "0503") { 
                document.getElementById('lockScreen').classList.add('hidden');
                document.getElementById('profileScreen').classList.remove('hidden');
            } else {
                alert("Incorrect password! Try again ❤️");
            }
        }

        // --- 2. Identity Management Logic ---
        function saveProfile() {
            const name = document.getElementById('nicknameInput').value.trim();
            if(name) {
                userNickname = name;
                document.getElementById('profileScreen').classList.add('hidden');
                document.getElementById('mainApp').classList.remove('hidden');
                listenForMessages();
            } else {
                alert("Please add a cute nickname!");
            }
        }

        // --- 3. Tab Switching Logic ---
        function switchTab(tabName) {
            const chatView = document.getElementById('chatView');
            const giftsView = document.getElementById('giftsView');
            const btnChat = document.getElementById('btnChat');
            const btnGifts = document.getElementById('btnGifts');

            if (tabName === 'chat') {
                chatView.classList.remove('hidden');
                giftsView.classList.add('hidden');
                btnChat.classList.add('active');
                btnGifts.classList.remove('active');
            } else {
                chatView.classList.add('hidden');
                giftsView.classList.remove('hidden');
                btnChat.classList.remove('active');
                btnGifts.classList.add('active');
            }
        }

        // --- 4. Database Live Messaging Logic ---
        function sendMessage() {
            const input = document.getElementById('chatInputField');
            const messageText = input.value.trim();
            if (messageText === "") return;

            database.ref("messages").push({
                sender: userNickname,
                text: messageText,
                timestamp: Date.now()
            });

            input.value = "";
        }

        function listenForMessages() {
            const chatBox = document.getElementById('chatBox');
            database.ref("messages").on("child_added", (snapshot) => {
                const data = snapshot.val();
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('message');
                
                if (data.sender === userNickname) {
                    msgDiv.classList.add('msg-right');
                    msgDiv.innerText = data.text;
                } else {
                    msgDiv.classList.add('msg-left');
                    msgDiv.innerText = `${data.sender}: ${data.text}`;
                }
                
                chatBox.appendChild(msgDiv);
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        document.getElementById('chatInputField').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') sendMessage();
        });

        // --- 5. Gift Redemption System ---
        function claimGift(button) {
            button.innerText = "Claimed! 🎉";
            button.classList.add('unlocked');
            button.disabled = true;
            alert("Reward Redeemed! Send a screenshot to your partner to cash it in! 😍");
        }
    </script>
</body>
</html>
